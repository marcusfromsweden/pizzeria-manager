databaseChangeLog:
  - changeSet:
      id: 1100-01
      author: marcus
      comment: "Add created_by and updated_by audit columns to users table"
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: updated_by
                  type: uuid

