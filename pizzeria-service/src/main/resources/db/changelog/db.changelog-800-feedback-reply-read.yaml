databaseChangeLog:
  - changeSet:
      id: 800-add-admin-reply-read-at
      author: claude
      changes:
        - addColumn:
            tableName: feedback
            columns:
              - column:
                  name: admin_reply_read_at
                  type: timestamp with time zone
                  remarks: "Timestamp when user viewed the admin reply. NULL means unread."
