databaseChangeLog:
  # =============================================================================
  # PIZZERIA TABLE - Central tenant registry
  # =============================================================================
  - changeSet:
      id: 300-01-create-pizzerias
      author: claude
      comment: Create pizzerias table for multi-tenant support
      changes:
        - createTable:
            tableName: pizzerias
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                  remarks: Unique identifier used in URLs/headers (e.g., "marios", "luigi")
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: Display name of the pizzeria
              - column:
                  name: currency
                  type: VARCHAR(3)
                  defaultValue: "SEK"
                  constraints:
                    nullable: false
                  remarks: ISO 4217 currency code
              - column:
                  name: timezone
                  type: VARCHAR(64)
                  defaultValue: "Europe/Stockholm"
                  constraints:
                    nullable: false
                  remarks: IANA timezone identifier
              - column:
                  name: config
                  type: JSONB
                  remarks: Pizzeria-specific configuration (opening hours, delivery zones, features)
              - column:
                  name: branding
                  type: JSONB
                  remarks: Branding configuration (logo URL, colors, tagline)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 300-02-add-pizzeria-constraints
      author: claude
      changes:
        - addUniqueConstraint:
            tableName: pizzerias
            columnNames: code
            constraintName: uq_pizzerias_code
        - createIndex:
            tableName: pizzerias
            indexName: idx_pizzerias_code
            columns:
              - column:
                  name: code
        - createIndex:
            tableName: pizzerias
            indexName: idx_pizzerias_active
            columns:
              - column:
                  name: active

  # =============================================================================
  # DEFAULT PIZZERIA - Insert default tenant for existing data
  # =============================================================================
  - changeSet:
      id: 300-03-insert-default-pizzeria
      author: claude
      comment: Create default pizzeria for existing data migration
      changes:
        - insert:
            tableName: pizzerias
            columns:
              - column:
                  name: id
                  value: "00000000-0000-0000-0000-000000000001"
              - column:
                  name: code
                  value: "default"
              - column:
                  name: name
                  value: "Default Pizzeria"
              - column:
                  name: currency
                  value: "SEK"
              - column:
                  name: timezone
                  value: "Europe/Stockholm"
              - column:
                  name: config
                  valueComputed: "'{\"features\": {\"dietarySuitability\": true, \"pizzaScores\": true, \"emailVerification\": true, \"familySizePricing\": true}}'::jsonb"
              - column:
                  name: branding
                  valueComputed: "'{\"primaryColor\": \"#D32F2F\", \"tagline\": \"Default Pizzeria\"}'::jsonb"
              - column:
                  name: active
                  valueBoolean: true

  # =============================================================================
  # ADD PIZZERIA_ID TO MENU_SECTIONS
