  - changeSet:
      id: 300-04-add-pizzeria-id-to-menu-sections
      author: claude
      changes:
        - addColumn:
            tableName: menu_sections
            columns:
              - column:
                  name: pizzeria_id
                  type: UUID
                  remarks: Reference to owning pizzeria

  - changeSet:
      id: 300-05-migrate-menu-sections-to-default-pizzeria
      author: claude
      comment: Assign existing menu sections to default pizzeria
      changes:
        - update:
            tableName: menu_sections
            columns:
              - column:
                  name: pizzeria_id
                  value: "00000000-0000-0000-0000-000000000001"
            where: pizzeria_id IS NULL

  - changeSet:
      id: 300-06-add-menu-sections-pizzeria-constraints
      author: claude
      changes:
        - addNotNullConstraint:
            tableName: menu_sections
            columnName: pizzeria_id
        - addForeignKeyConstraint:
            baseTableName: menu_sections
            baseColumnNames: pizzeria_id
            referencedTableName: pizzerias
            referencedColumnNames: id
            constraintName: fk_menu_sections_pizzeria
            onDelete: CASCADE
        - createIndex:
            tableName: menu_sections
            indexName: idx_menu_sections_pizzeria
            columns:
              - column:
                  name: pizzeria_id
        - dropUniqueConstraint:
            tableName: menu_sections
            constraintName: uq_menu_sections_code
        - addUniqueConstraint:
            tableName: menu_sections
            columnNames: pizzeria_id, code
            constraintName: uq_menu_sections_pizzeria_code

